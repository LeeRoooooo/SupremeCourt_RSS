name: Update Scourt RSS

on:
  schedule:
    # 매일 한국 시간 기준 09:00, 12:00, 15:00, 18:00, 21:00 실행
    # (UTC 기준: 00, 03, 06, 09, 12시)
    - cron: '0 0,3,6,9,12 * * *'
  workflow_dispatch:      # 필요할 때 수동으로 버튼 눌러 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest # 리넥스 환경에서 실행
    steps:
      - uses: actions/checkout@v3 # 내 코드 가져오기
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install tools
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: Run scraper
        run: python main.py
      - name: Commit and Push # 생성된 xml 파일을 저장소에 업데이트
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add scourt_press.xml
          git commit -m "Update RSS feed" || exit 0
          git push
