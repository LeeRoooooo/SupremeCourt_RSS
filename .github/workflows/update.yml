name: Update Scourt RSS

：:
  schedule:
    # 매일 한국 시간 기준 09:00, 12:00, 15:00, 18:00, 21:00 실행
    - cron: '0 0,3,6,9,12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 만약 경고를 즉시 없애고 싶다면 아래 환경변수를 추가하세요
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # v4에서 v5로 업데이트
      - name: Set up Python
        uses: actions/setup-python@v5 # v5 유지 또는 최신 확인
          python-version: '3.10' # 버전을 명시하여 경고를 제거합니다.
      - name: Install tools
        run: |
          pip install playwright feedgen
          playwright install chromium
      - name: Run scraper
        run: python main.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scourt_press.xml
          git commit -m "Update RSS feed" || exit 0
          git push
